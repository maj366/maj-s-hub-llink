<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Link Hub</title>
    <style>
        :root {
            --bg-color: #121217;
            --card-bg: #1e1e24;
            --text-color: #f5f5f5;
            --accent-discord: #7289DA;
            --accent-minecraft: #65C965;
            --hover-brightness: 1.2;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            --glow-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* For background effect */
        }

        /* Subtle background pattern */
        body::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 25px 25px;
            animation: move-background 30s linear infinite;
            z-index: -1;
        }

        @keyframes move-background {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-25px, -25px); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px; /* More padding */
            text-align: center;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.05); /* Subtle border */
        }

        .profile-img-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 110px; /* Slightly larger */
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--text-color);
            box-shadow: 0 0 15px var(--glow-color); /* Subtle glow */
        }

        /* Optional status indicator (e.g., online) */
        .profile-img-container::after {
            content: '';
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maj's Minecraft Network</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 3rem;
            color: #ffaa00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            color: #aaaaaa;
        }

        /* Discord Button */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 40px;
            transition: background-color 0.2s, transform 0.2s;
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Server Container */
        .server-container {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Server Cards */
        .server-card {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px;
            width: 450px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .server-card:hover {
            transform: translateY(-5px);
        }
